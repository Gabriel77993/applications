<!DOCTYPE html>
<html>
<head>
<title>Admin Application</title>
</head>

fetch("https://discord.com/api/webhooks/1480958603920932995/KtiqkXio2xmauARF0N375BLlB-KmJRzsJRcP68Gs7DhYuH9BDfDgxu8YyYM5eA94uuxh", {
method: "POST",
headers: {"Content-Type":"application/json"},
body: JSON.stringify({
content:
"📩 **New Admin Application**\n\n"+
"MC Username: "+mc+"\n"+
"Discord: "+discord+"\n"+

})
});

</script>

</body>
</html>
